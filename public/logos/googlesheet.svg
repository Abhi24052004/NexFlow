<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="googleSheetGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34a853;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#188038;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="48" height="48" fill="url(#googleSheetGradient)" rx="6"/>
  
  <!-- Grid pattern for sheet -->
  <g fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5">
    <!-- Vertical lines -->
    <line x1="14" y1="12" x2="14" y2="36"/>
    <line x1="22" y1="12" x2="22" y2="36"/>
    <line x1="30" y1="12" x2="30" y2="36"/>
    
    <!-- Horizontal lines -->
    <line x1="10" y1="18" x2="34" y2="18"/>
    <line x1="10" y1="24" x2="34" y2="24"/>
    <line x1="10" y1="30" x2="34" y2="30"/>
  </g>
  
  <!-- Border for sheet -->
  <rect x="10" y="12" width="24" height="24" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="1.5" rx="1"/>
</svg>
